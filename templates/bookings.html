{% from "nav.html" import bottom_nav %}
<!DOCTYPE html>
<html>
<head>
    <title>Bookings</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .cal-strip-wrap {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
            border-bottom: 1px solid #eee;
            padding: 10px 0 8px;
            margin: -16px -16px 16px;
        }
        .cal-strip {
            display: flex;
            overflow-x: auto;
            gap: 6px;
            padding: 0 16px;
            scrollbar-width: none;
        }
        .cal-strip::-webkit-scrollbar { display: none; }
        .cal-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 48px;
            padding: 6px 4px;
            border-radius: 10px;
            cursor: pointer;
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .cal-day .dow { font-size: 11px; color: #999; font-weight: bold; text-transform: uppercase; }
        .cal-day .dom { font-size: 20px; font-weight: bold; color: #333; line-height: 1.2; }
        .cal-day .dot { width: 6px; height: 6px; border-radius: 50%; background: #2d89ef; margin-top: 3px; }
        .cal-day.today .dom { color: #2d89ef; }
        .cal-day.today .dow { color: #2d89ef; }
        .cal-day.active { background: #2d89ef; border-color: #2d89ef; }
        .cal-day.active .dom, .cal-day.active .dow { color: white; }
        .cal-day.active .dot { background: white; }

        .booking-date-group { margin-bottom: 20px; }
        .booking-date-header {
            font-size: 13px;
            font-weight: bold;
            color: #2d89ef;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 2px solid #eef5fd;
        }
        .booking-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 8px;
            overflow: hidden;
        }
        .booking-row {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .booking-info { flex: 1; min-width: 0; }
        .booking-customer { font-weight: bold; font-size: 16px; margin-bottom: 2px; }
        .booking-address { font-size: 13px; color: #2d89ef; margin-bottom: 4px; text-decoration: none; display: block; }
        .booking-address:active { opacity: 0.7; }
        .booking-phone { font-size: 13px; color: #2d89ef; text-decoration: none; display: inline-block; margin-bottom: 4px; font-weight: 500; }
        .booking-meta { font-size: 14px; color: #555; }
        .bk-badge { display: inline-block; border-radius: 6px; padding: 2px 8px; font-size: 13px; font-weight: bold; margin-right: 4px; }
        .bk-type { background: #eef5fd; color: #2d89ef; }
        .bk-time { background: #eef5fd; color: #2d89ef; }
        .bk-done { background: #eafaf1; color: #27ae60; }
        .bk-unpaid { background: #fef9e7; color: #d4a017; }
        .booking-notes { font-size: 13px; color: #999; margin-top: 4px; }
        .booking-price { font-size: 17px; font-weight: bold; color: #222; white-space: nowrap; }

        .booking-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }
        .edit-link {
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%;
            background: #eef5fd; color: #2d89ef; text-decoration: none;
        }
        .edit-link svg { width: 18px; height: 18px; fill: currentColor; }

        /* Complete button on card */
        .complete-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .complete-btn.not-done { background: #eef5fd; color: #2d89ef; }
        .complete-btn.is-done { background: #eafaf1; color: #27ae60; }

        /* Completion sheet */
        .sheet-overlay {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; flex-direction: column; justify-content: flex-end;
            background: rgba(0,0,0,0.4);
        }
        .sheet-body {
            background: #fff;
            border-radius: 16px 16px 0 0;
            padding: 20px 16px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .sheet-title { font-weight: bold; font-size: 16px; color: #333; text-align: center; }
        .sheet-address { font-size: 13px; color: #888; text-align: center; }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }
        .toggle-label { font-weight: bold; font-size: 15px; color: #333; }
        .toggle-switch { position: relative; width: 52px; height: 28px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0;
            background: #ccc; border-radius: 28px;
            cursor: pointer; transition: background 0.2s;
        }
        .toggle-slider:before {
            content: ''; position: absolute;
            width: 22px; height: 22px;
            left: 3px; top: 3px;
            background: white; border-radius: 50%;
            transition: transform 0.2s;
        }
        input:checked + .toggle-slider { background: #27ae60; }
        input:checked + .toggle-slider:before { transform: translateX(24px); }
        .sheet-input {
            width: 100%; padding: 14px 12px; border-radius: 8px;
            border: 1px solid #ccc; font-size: 16px; box-sizing: border-box;
        }
        .sheet-save-btn {
            background: #27ae60; color: white; border: none;
            border-radius: 10px; padding: 16px; font-size: 17px;
            font-weight: bold; cursor: pointer; width: 100%;
        }
        .sheet-cancel-btn {
            background: #f0f0f0; color: #333; border: none;
            border-radius: 10px; padding: 14px; font-size: 16px;
            cursor: pointer; width: 100%;
        }
        .no-bookings-day { text-align: center; color: #ccc; font-size: 14px; padding: 20px 0; }
    </style>
</head>
<body class="page-content">
<div class="container">
    <div class="cal-strip-wrap">
        <div class="cal-strip" id="calStrip"></div>
    </div>
    <h2 style="margin-top:0;">Bookings</h2>
    <div id="bookingsList"></div>
</div>
{{ bottom_nav('bookings') }}

<!-- Phone action sheet template -->
<script>
const servicesRaw = {{ services_json | tojson }};

const byDate = {};
servicesRaw.forEach(s => {
    const d = s.service_date || 'no-date';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(s);
});

const today = new Date();
today.setHours(0,0,0,0);
const todayStr = today.toISOString().slice(0,10);
let activeDate = todayStr;

// ── PHONE HANDLER ─────────────────────────────────────────────
function handlePhone(e, rawPhone, digits) {
    e.preventDefault();
    e.stopPropagation();
    const sheet = document.createElement('div');
    sheet.className = 'sheet-overlay';
    sheet.innerHTML = `
        <div class="sheet-body">
            <div class="sheet-title">${rawPhone}</div>
            <a href="tel:${digits}" style="display:block;text-align:center;padding:16px;background:#2d89ef;color:white;border-radius:10px;font-weight:bold;font-size:17px;text-decoration:none;">Call</a>
            <a href="sms:${digits}" style="display:block;text-align:center;padding:16px;background:#27ae60;color:white;border-radius:10px;font-weight:bold;font-size:17px;text-decoration:none;">Text</a>
            <button class="sheet-cancel-btn" onclick="this.closest('.sheet-overlay').remove()">Cancel</button>
        </div>`;
    sheet.addEventListener('click', ev => { if(ev.target===sheet) sheet.remove(); });
    document.body.appendChild(sheet);
}

// ── FORMAT PHONE ──────────────────────────────────────────────
function fmtPhone(p) {
    if (!p) return '';
    const d = p.replace(/\D/g,'');
    if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    if (d.length === 11 && d[0]==='1') return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
    return p;
}

// ── COMPLETION SHEET ──────────────────────────────────────────
function openCompleteSheet(svc) {
    const sheet = document.createElement('div');
    sheet.className = 'sheet-overlay';
    const isComplete = !!svc.completed;
    const isPaid = !!svc.paid;
    const amtPaid = svc.amount_paid || '';
    const durMins = svc.duration_minutes || '';

    sheet.innerHTML = `
        <div class="sheet-body" id="sheetBody">
            <div class="sheet-title">${svc.customer || ''}</div>
            <div class="sheet-address">${svc.address || ''}</div>

            <div class="toggle-row">
                <span class="toggle-label">Mark as Complete</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="sCompleted" ${isComplete ? 'checked' : ''} onchange="sheetTogglePayment()">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div id="sPaySection" style="${isComplete ? '' : 'display:none'}">
                <div id="sDurationSection">
                    <label style="font-weight:bold;font-size:14px;color:#555;">Minutes</label>
                    <input type="number" id="sDuration" class="sheet-input" placeholder="e.g. 45" value="${durMins}" style="margin-top:6px;margin-bottom:8px;">
                </div>
                <div class="toggle-row">
                    <span class="toggle-label">Paid</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="sPaid" ${isPaid ? 'checked' : ''} onchange="sheetToggleAmt()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div id="sAmtSection" style="${isPaid ? '' : 'display:none'}">
                    <label style="font-weight:bold;font-size:14px;color:#555;">Amount Paid ($)</label>
                    <input type="number" id="sAmtPaid" class="sheet-input" step="0.01" placeholder="e.g. 120" value="${amtPaid}" style="margin-top:6px;">
                </div>
            </div>

            <button class="sheet-save-btn" onclick="saveCompletion(${svc.id})">Save</button>
            <button class="sheet-cancel-btn" onclick="this.closest('.sheet-overlay').remove()">Cancel</button>
        </div>`;
    sheet.addEventListener('click', ev => { if(ev.target===sheet) sheet.remove(); });
    document.body.appendChild(sheet);
}

function sheetTogglePayment() {
    const sec = document.getElementById('sPaySection');
    sec.style.display = document.getElementById('sCompleted').checked ? '' : 'none';
}
function sheetToggleAmt() {
    const sec = document.getElementById('sAmtSection');
    sec.style.display = document.getElementById('sPaid').checked ? '' : 'none';
}

async function saveCompletion(serviceId) {
    const completed = document.getElementById('sCompleted').checked ? 1 : 0;
    const paid = document.getElementById('sPaid') ? (document.getElementById('sPaid').checked ? 1 : 0) : 0;
    const amountPaid = document.getElementById('sAmtPaid') ? document.getElementById('sAmtPaid').value : '';
    const durationMinutes = document.getElementById('sDuration') ? document.getElementById('sDuration').value : '';

    const form = new FormData();
    form.append('completed', completed);
    form.append('paid', paid);
    form.append('amount_paid', amountPaid);
    form.append('duration_minutes', durationMinutes);

    try {
        await fetch(`/service/complete/${serviceId}`, { method: 'POST', body: form });
        // Update local data
        servicesRaw.forEach(s => {
            if (s.id === serviceId) {
                s.completed = completed;
                s.paid = paid;
                s.amount_paid = amountPaid ? parseFloat(amountPaid) : null;
                s.duration_minutes = durationMinutes ? parseInt(durationMinutes) : null;
            }
        });
        // Rebuild byDate
        Object.keys(byDate).forEach(k => delete byDate[k]);
        servicesRaw.forEach(s => {
            const d = s.service_date || 'no-date';
            if (!byDate[d]) byDate[d] = [];
            byDate[d].push(s);
        });
        document.querySelector('.sheet-overlay').remove();
        renderBookings();
    } catch(err) {
        alert('Error saving. Please try again.');
    }
}

// ── CALENDAR STRIP ────────────────────────────────────────────
function buildStrip() {
    const strip = document.getElementById('calStrip');
    strip.innerHTML = '';
    const days = [];
    for (let i = -30; i <= 60; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        days.push(d);
    }
    const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    days.forEach(d => {
        const ds = d.toISOString().slice(0,10);
        const el = document.createElement('div');
        el.className = 'cal-day' + (ds===todayStr?' today':'') + (ds===activeDate?' active':'');
        el.dataset.date = ds;
        const hasBookings = !!byDate[ds];
        el.innerHTML = `
            <div class="dow">${DOW[d.getDay()]}</div>
            <div class="dom">${d.getDate()}</div>
            ${hasBookings ? '<div class="dot"></div>' : '<div style="width:6px;height:6px;margin-top:3px;"></div>'}`;
        el.addEventListener('click', () => {
            activeDate = (activeDate === ds) ? null : ds;
            buildStrip();
            renderBookings();
        });
        strip.appendChild(el);
    });
    const todayEl = strip.querySelector(`[data-date="${todayStr}"]`);
    if (todayEl) setTimeout(() => todayEl.scrollIntoView({inline:'center',behavior:'smooth'}), 50);
}

// ── BOOKING LIST ──────────────────────────────────────────────
function time12(t) {
    if (!t) return '';
    const [hStr, mStr] = t.split(':');
    const h = parseInt(hStr, 10);
    const ampm = h < 12 ? 'AM' : 'PM';
    return `${h%12||12}:${mStr} ${ampm}`;
}
function fmtDate(ds) {
    if (!ds) return 'No Date';
    const [y,m,d] = ds.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return `${days[dt.getDay()]} ${months[m-1]} ${d}, ${y}`;
}
function fmtPrice(n) {
    const v = parseFloat(n);
    if (isNaN(v)) return null;
    return v%1===0 ? v.toFixed(0) : v.toFixed(2);
}

function renderBookings() {
    const list = document.getElementById('bookingsList');
    if (!list) return;

    let datesToShow;
    if (activeDate) {
        datesToShow = [activeDate];
    } else {
        const hasDated = Object.keys(byDate).filter(d => d !== 'no-date').sort();
        datesToShow = hasDated;
        if (byDate['no-date']) datesToShow = [...datesToShow, 'no-date'];
    }

    if (!datesToShow.length) {
        list.innerHTML = '<div class="no-bookings-day">No bookings yet.</div>';
        return;
    }

    let html = '';
    datesToShow.forEach(ds => {
        const items = byDate[ds] || [];
        if (!items.length) {
            if (activeDate) html += '<div class="no-bookings-day">No bookings on this day.</div>';
            return;
        }
        html += `<div class="booking-date-group">
            <div class="booking-date-header">${ds==='no-date'?'No Date':fmtDate(ds)}</div>`;

        items.forEach(s => {
            const price = fmtPrice(s.price);
            const amtPaid = fmtPrice(s.amount_paid);
            const rawPhone = s.phone || '';
            const fPhone = fmtPhone(rawPhone);
            const digits = rawPhone.replace(/\D/g,'');
            const mapsUrl = s.address ? `https://maps.apple.com/?q=${encodeURIComponent(s.address)}` : '#';
            const doneClass = s.completed ? 'is-done' : 'not-done';
            const doneLabel = s.completed ? 'Done' : 'Mark Done';
            // Escape for onclick JSON
            const svcJson = JSON.stringify(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');

            html += `<div class="booking-card">
                <div class="booking-row">
                    <div class="booking-info">
                        <div class="booking-customer">
                            ${s.service_time ? `<span class="bk-badge bk-time">${time12(s.service_time)}</span>` : ''}
                            ${s.customer || ''}
                        </div>
                        <a class="booking-address" href="${mapsUrl}" target="_blank"
                           onclick="event.stopPropagation()">
                            ${s.address || ''}
                        </a>
                        ${fPhone ? `<a class="booking-phone" href="tel:${digits}"
                            onclick="handlePhone(event,'${fPhone}','${digits}')">
                            ${fPhone}
                        </a>` : ''}
                        <div class="booking-meta" style="margin-top:4px;">
                            ${s.type ? `<span class="bk-badge bk-type">${s.type.charAt(0).toUpperCase()+s.type.slice(1)}</span>` : ''}
                            ${s.windows ? `<span class="bk-badge" style="background:#f0f7ff;color:#555;">${s.windows} windows</span>` : ''}
                            ${s.completed && !s.paid ? '<span class="bk-badge bk-unpaid">Unpaid</span>' : ''}
                            ${s.paid && amtPaid ? `<span style="color:#27ae60;font-size:13px;font-weight:bold;">Paid $${amtPaid}</span>` : ''}
                            ${s.completed && s.duration_minutes ? `<span class="bk-badge" style="background:#f5f0ff;color:#7c3aed;">${s.duration_minutes} min</span>` : ''}
                        </div>
                        ${s.notes ? `<div class="booking-notes">${s.notes}</div>` : ''}
                    </div>
                    <div class="booking-actions">
                        ${price ? `<div class="booking-price">$${price}</div>` : ''}
                        <button class="complete-btn ${doneClass}" onclick='openCompleteSheet(${JSON.stringify(s)})'>${doneLabel}</button>
                        <a class="edit-link" href="/map?highlight=${s.house_id || ''}" title="Show on map" style="background:#eafaf1;color:#27ae60;">
                            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
                        </a>
                        <a class="edit-link" href="/service/edit/${s.id}?back=/bookings" title="Edit">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </a>
                    </div>
                </div>
            </div>`;
        });
        html += '</div>';
    });

    list.innerHTML = html;
}

buildStrip();
renderBookings();
</script>
</body>
</html>
