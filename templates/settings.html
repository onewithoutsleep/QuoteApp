{% from "nav.html" import bottom_nav %}
<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body class="page-content">

<div class="container">

    <h1>Settings</h1>

    <div class="card">
        <form method="POST">

            <h2>Pricing (per window)</h2>

            <input
                name="outside_rate"
                type="number"
                step="0.01"
                placeholder="Outside Rate"
                value="{{ outside_rate }}"
            >

            <input
                name="inside_rate"
                type="number"
                step="0.01"
                placeholder="Inside Rate"
                value="{{ inside_rate }}"
            >

            <input
                name="both_rate"
                type="number"
                step="0.01"
                placeholder="Both Rate"
                value="{{ both_rate }}"
            >

            <h2>Email Template</h2>
            <p style="margin:0; color:#666; font-size:14px;">
                Use <code>{customer}</code>, <code>{outside}</code>,
                <code>{inside}</code>, <code>{both}</code> as placeholders.
            </p>
            <textarea name="email_template">{{ email_template }}</textarea>

            <h2>Text Template</h2>
            <p style="margin:0; color:#666; font-size:14px;">
                Same placeholders as above.
            </p>
            <textarea name="text_template">{{ text_template }}</textarea>

            <button type="submit">Save and Exit</button>

        </form>
    </div>

</div>

{{ bottom_nav('settings') }}

</body>
</html>
